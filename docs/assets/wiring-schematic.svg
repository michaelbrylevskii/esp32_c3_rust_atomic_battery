<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">ESP32-C3 Atomic Battery wiring schematic</title>
  <desc id="desc">Schematic-style wiring diagram for ESP32-C3 Super Mini, PN532, TM1637 display, two LEDs and activation switch.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .box { fill: #fffdf8; stroke: #1f2933; stroke-width: 2; rx: 12; }
      .module { fill: #f4f7fb; stroke: #1f2933; stroke-width: 2; rx: 12; }
      .pin { fill: #fff; stroke: #1f2933; stroke-width: 1.5; }
      .wire { fill: none; stroke: #1f2933; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-power { fill: none; stroke: #c2410c; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .wire-ground { fill: none; stroke: #334155; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .wire-signal { fill: none; stroke: #0f766e; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-led { fill: none; stroke: #7c3aed; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-switch { fill: none; stroke: #2563eb; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .text { font: 18px sans-serif; fill: #111827; }
      .small { font: 14px sans-serif; fill: #374151; }
      .tiny { font: 12px sans-serif; fill: #4b5563; }
      .label { font: 15px monospace; fill: #111827; }
      .rail-label { font: 18px monospace; font-weight: 700; }
      .resistor { fill: none; stroke: #1f2933; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .led-symbol { fill: none; stroke: #1f2933; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .junction { fill: #1f2933; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820"/>

  <text class="text" x="60" y="34">ESP32-C3 Super Mini wiring</text>
  <text class="small" x="60" y="58">PN532 on I2C, TM1637 display, active-high LEDs, switch to GND</text>

  <!-- Power rails -->
  <path class="wire-power" d="M60 90 H1140"/>
  <text class="rail-label" x="70" y="82" fill="#c2410c">3.3V</text>
  <path class="wire-ground" d="M60 760 H1140"/>
  <text class="rail-label" x="70" y="790" fill="#334155">GND</text>

  <!-- ESP32 module -->
  <rect class="module" x="80" y="170" width="300" height="440"/>
  <text class="text" x="135" y="210">ESP32-C3 Super Mini</text>
  <text class="tiny" x="130" y="235">Rust + ESP-IDF app target</text>

  <!-- ESP pins -->
  <g>
    <rect class="pin" x="350" y="252" width="60" height="24"/><text class="label" x="288" y="270">GPIO3 SDA</text>
    <rect class="pin" x="350" y="292" width="60" height="24"/><text class="label" x="288" y="310">GPIO4 SCL</text>
    <rect class="pin" x="350" y="362" width="60" height="24"/><text class="label" x="288" y="380">GPIO5 CLK</text>
    <rect class="pin" x="350" y="402" width="60" height="24"/><text class="label" x="288" y="420">GPIO6 DIO</text>
    <rect class="pin" x="350" y="482" width="60" height="24"/><text class="label" x="298" y="500">GPIO0</text>
    <rect class="pin" x="350" y="542" width="60" height="24"/><text class="label" x="298" y="560">GPIO1</text>
    <rect class="pin" x="350" y="652" width="60" height="24"/><text class="label" x="286" y="670">GPIO10</text>
    <rect class="pin" x="50" y="272" width="60" height="24"/><text class="label" x="120" y="290">3V3</text>
    <rect class="pin" x="50" y="532" width="60" height="24"/><text class="label" x="120" y="550">GND</text>
  </g>

  <!-- PN532 module -->
  <rect class="box" x="830" y="130" width="270" height="160"/>
  <text class="text" x="900" y="168">PN532</text>
  <text class="small" x="890" y="192">NFC reader, I2C mode</text>
  <text class="label" x="850" y="225">SDA</text>
  <text class="label" x="850" y="260">SCL</text>
  <text class="label" x="1026" y="225">VCC</text>
  <text class="label" x="1026" y="260">GND</text>

  <!-- TM1637 module -->
  <rect class="box" x="830" y="345" width="270" height="160"/>
  <text class="text" x="905" y="385">TM1637</text>
  <text class="small" x="883" y="410">4-digit display + colon</text>
  <text class="label" x="850" y="445">CLK</text>
  <text class="label" x="850" y="480">DIO</text>
  <text class="label" x="1026" y="445">VCC</text>
  <text class="label" x="1026" y="480">GND</text>

  <!-- Signal wires -->
  <path class="wire-signal" d="M410 264 H590 V215 H830"/>
  <path class="wire-signal" d="M410 304 H620 V250 H830"/>
  <path class="wire-signal" d="M410 374 H650 V445 H830"/>
  <path class="wire-signal" d="M410 414 H680 V480 H830"/>

  <!-- I2C pull-ups -->
  <text class="small" x="490" y="135">I2C pull-ups, 4.7k</text>
  <path class="wire-power" d="M560 90 V118"/>
  <path class="resistor" d="M560 118 l-10 8 l20 12 l-20 12 l20 12 l-10 8"/>
  <path class="wire-signal" d="M560 170 V215"/>
  <path class="wire-power" d="M625 90 V118"/>
  <path class="resistor" d="M625 118 l-10 8 l20 12 l-20 12 l20 12 l-10 8"/>
  <path class="wire-signal" d="M625 170 V250"/>
  <circle class="junction" cx="590" cy="215" r="4"/>
  <circle class="junction" cx="620" cy="250" r="4"/>

  <!-- Power wires -->
  <path class="wire-power" d="M80 284 H60 V90"/>
  <path class="wire-power" d="M1040 225 V90"/>
  <path class="wire-power" d="M1040 445 V90"/>
  <path class="wire-ground" d="M80 544 H60 V760"/>
  <path class="wire-ground" d="M1060 260 V760"/>
  <path class="wire-ground" d="M1060 480 V760"/>

  <!-- LED blocks -->
  <text class="text" x="830" y="565">Status LEDs</text>
  <text class="small" x="830" y="590">active-high, each through resistor</text>
  <text class="label" x="770" y="632">RED</text>
  <text class="label" x="770" y="702">GREEN</text>

  <path class="wire-led" d="M410 494 H560"/>
  <path class="resistor" d="M560 494 l10 -10 l12 20 l12 -20 l12 20 l12 -20 l10 10"/>
  <path class="led-symbol" d="M650 494 h26 m0 -18 v36 m0 -36 l34 18 l-34 18"/>
  <path class="wire-led" d="M710 494 H940 V620 H1010"/>
  <path class="wire-ground" d="M1010 620 V760"/>

  <path class="wire-led" d="M410 554 H560"/>
  <path class="resistor" d="M560 554 l10 -10 l12 20 l12 -20 l12 20 l12 -20 l10 10"/>
  <path class="led-symbol" d="M650 554 h26 m0 -18 v36 m0 -36 l34 18 l-34 18"/>
  <path class="wire-led" d="M710 554 H900 V690 H1010"/>
  <path class="wire-ground" d="M1010 690 V760"/>

  <!-- Switch -->
  <rect class="box" x="830" y="645" width="270" height="75"/>
  <text class="text" x="890" y="685">Activation switch</text>
  <text class="small" x="890" y="708">GPIO10 to GND</text>
  <path class="wire-switch" d="M410 664 H790"/>
  <path class="wire-switch" d="M790 664 h26"/>
  <path class="wire-switch" d="M816 664 l28 -18"/>
  <path class="wire-switch" d="M852 664 H830"/>
  <path class="wire-ground" d="M852 664 V760"/>
  <text class="tiny" x="500" y="650">internal pull-up enabled</text>

  <!-- Notes -->
  <rect class="box" x="440" y="680" width="310" height="58"/>
  <text class="small" x="460" y="705">PN532 reset pin is not connected yet.</text>
  <text class="small" x="460" y="727">Add it later if module reset is needed.</text>
</svg>
